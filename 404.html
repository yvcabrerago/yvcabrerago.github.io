<html lang="en">

<head>
	<title>Page Not Found</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<noscript>
		<link rel="stylesheet" href="assets/css/noscript.css" />
	</noscript>
</head>

<body class="is-preload">
	<!-- Wrapper -->
	<div id="wrapper">

		<!-- Main -->
		<main id="main">
			<div class="inner">
				<h1>404</h1>
				<p>Sorry, we don't have the page you were looking for, but here is a random quote instead.</p>
				<blockquote>
					<p class="quotes" id="quote"></p>
					<footer class="quotes" id="author"></footer>
				</blockquote>
			</div>
		</main>

	</div>

	<!-- Scripts -->
	<script src="assets/js/jquery.min.js"></script>
	<script src="assets/js/browser.min.js"></script>
	<script src="assets/js/breakpoints.min.js"></script>
	<script src="assets/js/util.js"></script>
	<script src="assets/js/main.js"></script>
	<script>
		var COOLDOWN_MS = 30000; // 30 seconds between API calls

		async function loadRandomQuote() {
			var cached = sessionStorage.getItem("cachedQuote");
			if (cached) {
				var entry = JSON.parse(cached);
				if (Date.now() - entry.timestamp < COOLDOWN_MS) {
					displayQuote(entry.quote, entry.author);
					return;
				}
			}

			try {
				var response = await fetch("https://dummyjson.com/quotes/random");
				var data = await response.json();
				sessionStorage.setItem("cachedQuote", JSON.stringify({
					quote: data.quote,
					author: data.author,
					timestamp: Date.now()
				}));
				displayQuote(data.quote, data.author);
			} catch (error) {
				displayQuote("The only way to do great work is to love what you do.", "Steve Jobs");
			}
		}

		function displayQuote(quote, author) {
			document.getElementById("quote").innerHTML = "<em>" + quote + "</em>";
			document.getElementById("author").textContent = "\u2014 " + author;
		}

		loadRandomQuote();
	</script>

</body>

</html>
