<html lang="en">

<head>
	<title>Page Not Found</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<noscript>
		<link rel="stylesheet" href="assets/css/noscript.css" />
	</noscript>
</head>

<body class="is-preload">
	<!-- Wrapper -->
	<div id="wrapper">

		<!-- Main -->
		<main id="main">
			<div class="inner">
				<h1>404</h1>
				<p>Sorry, we don't have the page you were looking for, but here is a random quote instead.</p>
				<blockquote>
					<p class="quotes" id="quote"></p>
					<footer class="quotes" id="author"></footer>
				</blockquote>
			</div>
		</main>

	</div>

	<!-- Scripts -->
	<script src="assets/js/jquery.min.js"></script>
	<script src="assets/js/browser.min.js"></script>
	<script src="assets/js/breakpoints.min.js"></script>
	<script src="assets/js/util.js"></script>
	<script src="assets/js/main.js"></script>
	<script>
		async function loadRandomQuote() {
			try {
				const response = await fetch("https://dummyjson.com/quotes/random");
				const data = await response.json();
				document.getElementById("quote").innerHTML = "<em>" + data.quote + "</em>";
				document.getElementById("author").textContent = "\u2014 " + data.author;
			} catch (error) {
				document.getElementById("quote").textContent = "The only way to do great work is to love what you do.";
				document.getElementById("author").textContent = "\u2014 Steve Jobs";
			}
		}
		loadRandomQuote();
	</script>

</body>

</html>
